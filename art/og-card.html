<!doctype html>
<!--
  Clarity Value — Open Graph social card (1200x630)
  --------------------------------------------------
  Renders at exactly 1200x630 so it can be screenshot-saved as /art/og-image.png
  for use in og:image / twitter:image meta tags.

  HOW TO CONVERT TO PNG:
  1. Open this file in Chrome on a desktop (drag-drop the file in, or open via
     file:// path). Window doesn't matter — the card is fixed at 1200x630.
  2. Open DevTools (Cmd+Opt+I on Mac), press Cmd+Shift+P, type "Capture full
     size screenshot", press Enter. Chrome saves a PNG at the exact 1200x630.
  3. Rename the file to og-image.png and drop it in /art/.
  4. Push the change. iMessage/RCS/Slack will pull this image when anyone
     shares a clarityvalue.netlify.app URL.

  Alternatively: open this file in Chrome, set viewport to 1200x630 in
  responsive design mode, screenshot the visible area, save as PNG.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Clarity Value — Social card</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  /* Body IS the card — no centered wrapper, no surrounding dark canvas. This way
     Chrome's "Capture full size screenshot" produces a clean 1200x630 PNG with
     no black margin around the design. */
  html,body{width:1200px;height:630px;overflow:hidden;font-family:'Public Sans','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .card{
    width:1200px;height:630px;
    background:linear-gradient(135deg,#001A3A 0%,#0A2B5A 50%,#185FA5 100%);
    color:#fff;
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;
    padding:64px 72px;
  }
  /* Atmospheric wash overlay — mirrors the hero's wash texture */
  .card::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(ellipse 80% 60% at 75% 30%, rgba(133,183,235,0.25), transparent 70%);
    pointer-events:none;
  }
  /* Subtle grid */
  .card::after{
    content:"";position:absolute;inset:0;
    background-image:linear-gradient(to right,rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,0.04) 1px,transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 90% 70% at 50% 50%, #000 40%, transparent 100%);
    pointer-events:none;
  }
  .brand{display:flex;align-items:center;gap:14px;position:relative;z-index:2}
  .brand svg{width:32px;height:32px}
  .brand-name{font-size:24px;font-weight:500;letter-spacing:-0.01em;color:#fff}
  .eyebrow{
    display:inline-flex;align-items:center;gap:10px;
    margin-top:auto;padding:8px 16px;
    background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.18);
    border-radius:999px;align-self:flex-start;
    font-family:'Roboto Mono',ui-monospace,monospace;font-size:12px;font-weight:500;
    letter-spacing:0.10em;text-transform:uppercase;color:rgba(255,255,255,0.70);
    position:relative;z-index:2;
  }
  .eyebrow::before{content:"";width:8px;height:8px;border-radius:50%;background:#5fdc8e;box-shadow:0 0 8px rgba(95,220,142,0.6)}
  .headline{
    margin-top:24px;
    font-size:84px;font-weight:500;line-height:1.04;letter-spacing:-0.026em;
    text-wrap:balance;max-width:1000px;
    position:relative;z-index:2;
  }
  .headline em{font-family:'EB Garamond','Playfair Display',Georgia,serif;font-style:italic;color:#E8C28A;font-weight:500;letter-spacing:-0.02em}
  .footer{
    display:flex;justify-content:space-between;align-items:flex-end;
    margin-top:auto;
    font-family:'Roboto Mono',ui-monospace,monospace;font-size:13px;
    letter-spacing:0.10em;text-transform:uppercase;color:rgba(255,255,255,0.55);
    position:relative;z-index:2;
  }
  .footer .url{color:rgba(255,255,255,0.85);font-weight:500}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4" fill="#fff" stroke="none"/>
        <line x1="12" y1="6" x2="12" y2="2.5"/><line x1="15" y1="6.8" x2="16.75" y2="3.77"/><line x1="17.2" y1="9" x2="20.23" y2="7.25"/><line x1="18" y1="12" x2="21.5" y2="12"/><line x1="17.2" y1="15" x2="20.23" y2="16.75"/><line x1="15" y1="17.2" x2="16.75" y2="20.23"/><line x1="12" y1="18" x2="12" y2="21.5"/><line x1="9" y1="17.2" x2="7.25" y2="20.23"/><line x1="6.8" y1="15" x2="3.77" y2="16.75"/><line x1="6" y1="12" x2="2.5" y2="12"/><line x1="6.8" y1="9" x2="3.77" y2="7.25"/><line x1="9" y1="6.8" x2="7.25" y2="3.77"/>
      </svg>
      <span class="brand-name">Clarity Value</span>
    </div>

    <div style="margin-top:48px">
      <span class="eyebrow">One platform &middot; Built in Miami</span>
      <h1 class="headline">The system underneath <em>the system.</em></h1>
    </div>

    <div class="footer">
      <span class="url">clarityvalue.co</span>
      <span>Civic infrastructure for government workflows</span>
    </div>
  </div>
</body>
</html>
