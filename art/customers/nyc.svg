<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="New York City">
  <style>
    .nyc-mark{font-family:'Public Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;fill:#1F2733}
    .nyc-eyebrow{font-family:'Public Sans',-apple-system,sans-serif;font-weight:500;letter-spacing:0.10em;fill:#5C6588}
  </style>
  <g>
    <text class="nyc-eyebrow" x="0" y="20" font-size="9">CITY OF</text>
